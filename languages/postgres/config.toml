name = "PostgreSQL"
grammar = "postgres"
path_suffixes = ["sql", "psql", "pgsql"]
line_comments = ["-- "]
autoclose_before = ",;)]}"

brackets = [
    { start = "(", end = ")", close = true, newline = false },
    { start = "[", end = "]", close = true, newline = false },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string", "comment"] },
]
